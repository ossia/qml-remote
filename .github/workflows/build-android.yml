name: Build Android app

on: push

jobs:
  android:
    name: Android build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Host Qt: androiddeployqt + qt-cmake host tools. Installed alongside the
      # android Qt so qt-cmake auto-detects QT_HOST_PATH from the sibling.
      - name: Install Qt (host)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.*'
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtwebsockets
          dir: ${{ runner.temp }}/qt

      - name: Install Qt (android arm64)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.11.*'
          host: linux
          target: android
          arch: android_arm64_v8a
          modules: qtwebsockets
          dir: ${{ runner.temp }}/qt

      # ubuntu-latest ships an Android SDK/NDK; Qt 6.11 expects NDK r26b (26.1.x).
      # Pin it so the build is reproducible.
      - name: Install Android NDK 26.1.10909125
        run: |
          sdkmanager --install "ndk;26.1.10909125"
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - name: Build
        run: |
          # $QT_ROOT_DIR is set by install-qt-action to the last (android) install.
          "$QT_ROOT_DIR/bin/qt-cmake" -G Ninja -S src -B build-android \
            -DCMAKE_BUILD_TYPE=Release \
            -DANDROID_SDK_ROOT="$ANDROID_SDK_ROOT" \
            -DANDROID_NDK_ROOT="$ANDROID_NDK_ROOT" \
            -DQT_ANDROID_BUILD_ALL_ABIS=OFF
          cmake --build build-android
          cmake --build build-android --target apk

      # Qt 6 + CMake emits the APK under the gradle output tree.
      - name: Collect APK
        run: |
          APK=$(find build-android -name '*.apk' | head -n1)
          echo "Found APK: $APK"
          cp "$APK" ossia-remote.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android build
          path: ossia-remote.apk

      - name: Upload release
        if: startsWith(github.ref, 'refs/tags')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ossia-remote.apk
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
