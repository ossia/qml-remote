name: Build app

on: push

jobs:
  desktop:
    name: Ubuntu build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt 6.12
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.12.0'
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtwebsockets

      - name: Install build tools
        run: |
          sudo apt-get update -qq
          # Qt 6.12 Qt6Gui resolves GL/EGL/xkb/Vulkan dev deps at find_package time.
          sudo apt-get install -y ninja-build \
            libgl1-mesa-dev libegl1-mesa-dev libxkbcommon-dev libvulkan-dev

      - name: Build
        run: |
          cmake -G Ninja -S src -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      # Headless smoke test: load the QML scene with the offscreen platform and
      # the software backend (no GPU on CI). main.cpp exits non-zero if the root
      # component fails to load, so an early exit fails the job; staying up until
      # the timeout (124) means the whole QML tree instantiated cleanly.
      - name: Smoke test (headless load)
        run: |
          export QT_QPA_PLATFORM=offscreen
          export QT_QUICK_BACKEND=software
          export QT_FORCE_STDERR_LOGGING=1
          # GitHub runs steps with `bash -eo pipefail`; capture timeout's exit
          # without letting set -e abort on it (124 = ran to timeout = OK).
          code=0
          timeout 8 ./build/ossia_remote || code=$?
          if [ "$code" -eq 124 ]; then
            echo "QML scene loaded and ran until timeout — OK"
            exit 0
          fi
          echo "App exited early (code $code) — QML failed to load"
          exit 1
