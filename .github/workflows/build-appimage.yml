name: Build Linux AppImage

on: push

permissions:
  contents: write

jobs:
  appimage:
    name: Linux AppImage
    # Older glibc -> the AppImage runs on a wider range of distributions.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -qq
          # The SDK's static Qt6Gui scans all its GUI plugins (xcb + eglfs/kms +
          # wayland) at find_package time; install the full dev-dep set so every
          # find_dependency() resolves.
          sudo apt-get install -y ninja-build \
            libfontconfig1-dev libfreetype-dev \
            libx11-dev libx11-xcb-dev libxext-dev libxfixes-dev libxi-dev libxrender-dev \
            libxcb1-dev libxcb-cursor-dev libxcb-glx0-dev libxcb-keysyms1-dev \
            libxcb-image0-dev libxcb-shm0-dev libxcb-icccm4-dev libxcb-sync-dev \
            libxcb-xfixes0-dev libxcb-shape0-dev libxcb-randr0-dev \
            libxcb-render-util0-dev libxcb-util-dev libxcb-xinerama0-dev libxcb-xkb-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev libglu1-mesa-dev \
            libdrm-dev libgbm-dev libinput-dev libts-dev libmtdev-dev \
            libwayland-dev libwayland-egl-backend-dev wayland-protocols \
            libvulkan-dev libsm-dev libice-dev

      # Static ossia SDK. The archive carries an opt/ossia-sdk-x86_64/ prefix, so
      # extracting at / lands it at /opt/ossia-sdk-x86_64 (its baked-in path).
      - name: Fetch ossia SDK
        run: |
          curl -L --retry 3 -o sdk.tar.xz \
            "https://github.com/ossia/sdk/releases/download/sdk37/sdk-linux-x86_64.tar.xz"
          sudo tar xaf sdk.tar.xz -C /

      - name: Build (static)
        run: |
          OSSIA_SDK=/opt/ossia-sdk-x86_64
          cmake -G Ninja -S src -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOSSIA_SDK="$OSSIA_SDK" \
            -DCMAKE_C_COMPILER="$OSSIA_SDK/llvm/bin/clang" \
            -DCMAKE_CXX_COMPILER="$OSSIA_SDK/llvm/bin/clang++"
          cmake --build build

      - name: Package AppImage
        run: |
          # AppImage tools need FUSE; extract-and-run avoids installing libfuse2.
          export APPIMAGE_EXTRACT_AND_RUN=1
          curl -L -o linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy
          ./linuxdeploy --appdir AppDir \
            -e build/ossia_remote \
            -d packaging/ossia_remote.desktop \
            -i packaging/ossia_remote.png \
            --output appimage
          mv ./*.AppImage ossia-remote-x86_64.AppImage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Linux AppImage
          path: ossia-remote-x86_64.AppImage

      - name: Continuous release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          name: Continuous
          tag_name: continuous
          prerelease: true
          body: "Rolling build from the latest commit on `main`. For stable versions, see the tagged releases."
          files: ossia-remote-x86_64.AppImage

      - name: Tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ossia-remote-x86_64.AppImage
