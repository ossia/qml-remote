name: Spellcheck Action
on:
  # Run only for pull requests, pushes to the default branch (i.e. merged
  # PRs) and version tags — mirrors ossia/score.
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - uses: rojopolis/spellcheck-github-actions@0.14.0
      name: Spellcheck
      with:
        config_path: config/.spellcheck.yml # path to configuration file here
        source_files: src/*
        task_name: Qml