name: Spellcheck Action
on:
  # Run only for pull requests, pushes to the default branch (i.e. merged
  # PRs) and version tags — mirrors ossia/score.
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Spellcheck
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
    - uses: rojopolis/spellcheck-github-actions@0.14.0
      name: Spellcheck
      with:
        # The action passes source_files verbatim to pyspelling; a glob like
        # `src/*` is never expanded, so it was silently skipped and nothing got
        # checked. Let the config's own `sources:` (src/**/*.qml) drive it.
        config_path: config/.spellcheck.yml # path to configuration file here