name: Build macOS app

on:
  # Build only for pull requests, pushes to the default branch (i.e. merged
  # PRs) and version tags — mirrors ossia/score. No builds on arbitrary
  # branch pushes.
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  macos:
    name: macOS build (${{ matrix.osx_arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # SDK asset uses aarch64/x86_64; CMAKE_OSX_ARCHITECTURES uses arm64/x86_64.
          # Both build on the Apple-Silicon runner; x86_64 cross-compiles (as
          # ossia/score does), avoiding the scarce/slow Intel runners.
          - { osx_arch: arm64,  sdk_arch: aarch64, runner: macos-latest }
          - { osx_arch: x86_64, sdk_arch: x86_64,  runner: macos-latest }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ninja
        run: brew install ninja

      # Static ossia SDK: bundles a static Qt6 (clang/libc++) + deps. The archive
      # is prefixed with opt/ossia-sdk-<arch>/, stripped off on extraction.
      - name: Fetch ossia SDK
        run: |
          curl -L --retry 3 -o sdk.tar.xz \
            "https://github.com/ossia/sdk/releases/download/sdk37/sdk-macOS-${{ matrix.sdk_arch }}.tar.xz"
          sudo mkdir -p "/opt/ossia-sdk-${{ matrix.sdk_arch }}"
          sudo tar -xf sdk.tar.xz --strip-components=2 -C "/opt/ossia-sdk-${{ matrix.sdk_arch }}"

      - name: Build
        run: |
          cmake -G Ninja -S src -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOSSIA_SDK="/opt/ossia-sdk-${{ matrix.sdk_arch }}" \
            -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }} \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
          cmake --build build

      - name: Package
        run: tar -czf ossia-remote-macos-${{ matrix.osx_arch }}.tar.gz -C build ossia_remote

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macOS ${{ matrix.osx_arch }}
          path: ossia-remote-macos-${{ matrix.osx_arch }}.tar.gz

      - name: Continuous release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          name: Continuous
          tag_name: continuous
          prerelease: true
          body: "Rolling build from the latest commit on `main`. For stable versions, see the tagged releases."
          files: ossia-remote-macos-${{ matrix.osx_arch }}.tar.gz

      - name: Tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ossia-remote-macos-${{ matrix.osx_arch }}.tar.gz
