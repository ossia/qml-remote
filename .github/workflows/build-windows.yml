name: Build Windows app

on:
  # Build only for pull requests, pushes to the default branch (i.e. merged
  # PRs) and version tags — mirrors ossia/score. No builds on arbitrary
  # branch pushes.
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  windows:
    name: Windows build
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ninja
        run: choco install ninja -y --no-progress

      # Static ossia SDK: bundles a static Qt6 + a self-contained clang/LLVM.
      - name: Fetch ossia SDK
        shell: bash
        run: |
          mkdir -p /c/ossia-sdk-x86_64
          cd /c/ossia-sdk-x86_64
          curl -L --retry 3 -o sdk.7z \
            "https://github.com/ossia/sdk/releases/download/sdk37/sdk-mingw-x86_64.7z"
          7z x -y sdk.7z >/dev/null
          rm sdk.7z

      - name: Build
        shell: bash
        run: |
          # The SDK's clang/LLVM and Qt host tools (moc/rcc/qmlimportscanner)
          # need their runtime DLLs from these dirs on PATH.
          export PATH="/c/ossia-sdk-x86_64/qt6-static/bin:/c/ossia-sdk-x86_64/llvm/bin:$PATH"
          cmake -G Ninja -S src -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOSSIA_SDK=c:/ossia-sdk-x86_64 \
            -DCMAKE_C_COMPILER=c:/ossia-sdk-x86_64/llvm/bin/clang.exe \
            -DCMAKE_CXX_COMPILER=c:/ossia-sdk-x86_64/llvm/bin/clang++.exe
          cmake --build build

      - name: Package
        shell: bash
        run: cp build/ossia_remote.exe ossia-remote-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows build
          path: ossia-remote-windows-x86_64.exe

      - name: Continuous release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          name: Continuous
          tag_name: continuous
          prerelease: true
          body: "Rolling build from the latest commit on `main`. For stable versions, see the tagged releases."
          files: ossia-remote-windows-x86_64.exe

      - name: Tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ossia-remote-windows-x86_64.exe
