name: Build wasm app

on: push

jobs:
  wasm:
    name: wasm build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Host Qt: provides qt-cmake / androiddeployqt-style host tools for the
      # wasm cross-build. Installed into the same dir as the wasm Qt so that
      # qt-cmake auto-detects QT_HOST_PATH from the sibling desktop install.
      - name: Install Qt (host)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.12.*'
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtwebsockets
          dir: ${{ runner.temp }}/qt

      # Qt 6.8+ publishes wasm under the unified "all_os" host (the "linux" host
      # rejects target: wasm).
      - name: Install Qt (wasm)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.12.*'
          host: all_os
          target: wasm
          arch: wasm_singlethread
          modules: qtwebsockets
          dir: ${{ runner.temp }}/qt

      # Qt 6.12 pins Emscripten 5.0.5 exactly: qt-cmake aborts configuration if
      # QT_EMCC_VERSION ("5.0.5") doesn't match the active emcc (no ABI guarantee
      # across emscripten versions). Host and wasm Qt must share the same minor.
      - name: Setup Emscripten 5.0.5
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.5

      - name: Build
        run: |
          # $QT_ROOT_DIR is set by install-qt-action to the last (wasm) install.
          "$QT_ROOT_DIR/bin/qt-cmake" -G Ninja -S src -B build-wasm
          cmake --build build-wasm

      - name: Package
        run: tar -czvf build-wasm.tar.gz build-wasm/*.html build-wasm/*.js build-wasm/*.wasm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WASM build
          path: build-wasm.tar.gz

      - name: Upload release
        if: startsWith(github.ref, 'refs/tags')
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build-wasm.tar.gz
          tag: ${{ github.ref }}
          overwrite: true
          file_glob: true
