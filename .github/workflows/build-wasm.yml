name: Build wasm app

on:
  # Build only for pull requests, pushes to the default branch (i.e. merged
  # PRs) and version tags — mirrors ossia/score. No builds on arbitrary
  # branch pushes.
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  wasm:
    name: wasm build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Host Qt: provides qt-cmake / androiddeployqt-style host tools for the
      # wasm cross-build. Installed into the same dir as the wasm Qt so that
      # qt-cmake auto-detects QT_HOST_PATH from the sibling desktop install.
      - name: Install Qt (host)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.12.0'
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtwebsockets
          dir: ${{ runner.temp }}/qt

      # Qt 6.8+ publishes wasm under the unified "all_os" host (the "linux" host
      # rejects target: wasm).
      - name: Install Qt (wasm)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.12.0'
          host: all_os
          target: wasm
          arch: wasm_singlethread
          modules: qtwebsockets
          dir: ${{ runner.temp }}/qt

      # Qt 6.12 pins Emscripten 5.0.5 exactly: qt-cmake aborts configuration if
      # QT_EMCC_VERSION ("5.0.5") doesn't match the active emcc (no ABI guarantee
      # across emscripten versions). Host and wasm Qt must share the same minor.
      - name: Setup Emscripten 5.0.5
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 5.0.5

      - name: Build
        run: |
          # $QT_ROOT_DIR is set by install-qt-action to the last (wasm) install.
          # install-qt-action's all_os/wasm extraction drops the +x bit on the
          # bundled tools, so restore it before invoking qt-cmake.
          chmod -R u+x "$QT_ROOT_DIR/bin" "$QT_ROOT_DIR/libexec" 2>/dev/null || true
          "$QT_ROOT_DIR/bin/qt-cmake" -G Ninja -S src -B build-wasm
          cmake --build build-wasm

      - name: Package
        run: tar -czf ossia-remote-wasm.tar.gz -C build-wasm
             ossia_remote.html ossia_remote.js ossia_remote.wasm qtloader.js

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WASM build
          path: ossia-remote-wasm.tar.gz

      - name: Continuous release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          name: Continuous
          tag_name: continuous
          prerelease: true
          body: "Rolling build from the latest commit on `main`. For stable versions, see the tagged releases."
          files: ossia-remote-wasm.tar.gz

      - name: Tagged release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: ossia-remote-wasm.tar.gz
